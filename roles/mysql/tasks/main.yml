---
- name: 安装wget
  yum: name=wget state=present

- name: 将mysql压缩包传到指定目录下
  copy: src=/etc/ansible/roles/mysql/files/mysql-5.7.31-linux-glibc2.12-x86_64.tar.gz dest=/root/

- name: 执行mysql安装脚本
  script: /etc/ansible/roles/mysql/files/mysql-5.7.sh {{ mysql_root_pass }}

- name: 创建wordpress数据库用户
  shell: /usr/local/mysql/bin/mysql -uroot -p'{{ mysql_root_pass }}' -e "grant all on wordpress.* to 'wordpress'@'127.0.0.1' identified by '123'; flush privileges;"

- name: 创建mysqld_exporter数据库用户
  shell: /usr/local/mysql/bin/mysql -uroot -p'{{ mysql_root_pass }}' -e "grant process,replication client,select on *.* to 'exporter'@'127.0.0.1' identified by 'exporter_pass'; flush privileges;"

- name: 下载并安装mysqld_exporter
  shell: |
    wget https://github.com/prometheus/mysqld_exporter/releases/download/v0.14.0/mysqld_exporter-0.14.0.linux-amd64.tar.gz -O /root/mysqld_exporter.tar.gz
    tar -xf /root/mysqld_exporter.tar.gz -C /usr/local/
    mv /usr/local/mysqld_exporter-* /usr/local/mysqld_exporter
    useradd -r -s /sbin/nologin prometheus 2>/dev/null || true
    cat > /usr/local/mysqld_exporter/.my.cnf <<MYEOF
    [client]
    user=exporter
    password=exporter_pass
    MYEOF
  args:
    creates: /usr/local/mysqld_exporter/mysqld_exporter

- name: 配置mysqld_exporter systemd服务并启动
  shell: |
    cat > /usr/lib/systemd/system/mysqld_exporter.service <<EOF
    [Unit]
    Description=MySQL Prometheus Exporter
    After=network.target mysqld.service
    [Service]
    Type=simple
    User=prometheus
    Group=prometheus
    ExecStart=/usr/local/mysqld_exporter/mysqld_exporter --config.my-cnf=/usr/local/mysqld_exporter/.my.cnf
    Restart=on-failure
    [Install]
    WantedBy=multi-user.target
    EOF
    systemctl daemon-reload
    systemctl enable mysqld_exporter
    systemctl restart mysqld_exporter

- name: 防火墙放行mysqld_exporter端口
  shell: systemctl is-active firewalld && firewall-cmd --add-port=9104/tcp --permanent && firewall-cmd --reload || true

- name: 安装node_exporter（MySQL节点）
  shell: |
    wget https://github.com/prometheus/node_exporter/releases/download/v1.6.1/node_exporter-1.6.1.linux-amd64.tar.gz -O /root/node_exporter.tar.gz
    tar -xf /root/node_exporter.tar.gz -C /usr/local/
    mv /usr/local/node_exporter-* /usr/local/node_exporter
    useradd -r -s /sbin/nologin prometheus 2>/dev/null || true
    cat > /usr/lib/systemd/system/node_exporter.service <<EOF
    [Unit]
    Description=Node Exporter
    After=network.target
    [Service]
    Type=simple
    User=prometheus
    Group=prometheus
    ExecStart=/usr/local/node_exporter/node_exporter
    Restart=on-failure
    [Install]
    WantedBy=multi-user.target
    EOF
    systemctl daemon-reload
    systemctl enable node_exporter
    systemctl restart node_exporter
  args:
    creates: /usr/local/node_exporter/node_exporter

- name: 防火墙放行node_exporter端口
  shell: systemctl is-active firewalld && firewall-cmd --add-port=9100/tcp --permanent && firewall-cmd --reload || true
