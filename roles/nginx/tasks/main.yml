---
- name: 安装wget
  yum: name=wget state=present

- name: 将nginx压缩包传到指定目录下
  copy: src=/etc/ansible/roles/nginx/files/nginx-1.24.0.tar.gz dest=/root/

- name: 将wordpress压缩包传到指定目录下
  copy: src=/etc/ansible/roles/nginx/files/wordpress-6.7.1.tar.gz dest=/root/

- name: 执行nginx安装脚本
  script: /etc/ansible/roles/nginx/files/nginx.sh

- name: 修改Nginx.conf配置文件
  copy: src=/etc/ansible/roles/nginx/files/nginx.conf dest=/usr/local/nginx/conf/nginx.conf

- name: reload nginx
  service: name=nginx state=reloaded

- name: 解压wordpress源码至nginx家目录
  script: /etc/ansible/roles/nginx/files/wordpress.sh

- name: 开启防火墙80端口
  shell: systemctl is-active firewalld && firewall-cmd --add-port=80/tcp --permanent && firewall-cmd --reload || true

- name: 下载并安装node_exporter
  shell: |
    wget https://github.com/prometheus/node_exporter/releases/download/v1.6.1/node_exporter-1.6.1.linux-amd64.tar.gz -O /root/node_exporter.tar.gz
    tar -xf /root/node_exporter.tar.gz -C /usr/local/
    mv /usr/local/node_exporter-* /usr/local/node_exporter
    useradd -r -s /sbin/nologin prometheus 2>/dev/null || true
  args:
    creates: /usr/local/node_exporter/node_exporter

- name: 配置node_exporter systemd服务并启动
  shell: |
    cat > /usr/lib/systemd/system/node_exporter.service <<EOF
    [Unit]
    Description=Node Exporter
    After=network.target
    [Service]
    Type=simple
    User=prometheus
    Group=prometheus
    ExecStart=/usr/local/node_exporter/node_exporter
    Restart=on-failure
    [Install]
    WantedBy=multi-user.target
    EOF
    systemctl daemon-reload
    systemctl enable node_exporter
    systemctl restart node_exporter

- name: 防火墙放行node_exporter端口
  shell: systemctl is-active firewalld && firewall-cmd --add-port=9100/tcp --permanent && firewall-cmd --reload || true

- name: 下载并安装nginx_exporter
  shell: |
    wget https://github.com/nginxinc/nginx-prometheus-exporter/releases/download/v0.11.0/nginx-prometheus-exporter-0.11.0-linux-amd64.tar.gz -O /root/nginx_exporter.tar.gz
    tar -xf /root/nginx_exporter.tar.gz -C /usr/local/
    mv /usr/local/nginx-prometheus-exporter-* /usr/local/nginx_exporter
  args:
    creates: /usr/local/nginx_exporter/nginx-prometheus-exporter

- name: 配置nginx_exporter systemd服务并启动
  shell: |
    cat > /usr/lib/systemd/system/nginx_exporter.service <<EOF
    [Unit]
    Description=Nginx Prometheus Exporter
    After=network.target
    [Service]
    Type=simple
    User=prometheus
    Group=prometheus
    ExecStart=/usr/local/nginx_exporter/nginx-prometheus-exporter -nginx.scrape-uri=http://127.0.0.1/nginx_status
    Restart=on-failure
    [Install]
    WantedBy=multi-user.target
    EOF
    systemctl daemon-reload
    systemctl enable nginx_exporter
    systemctl restart nginx_exporter

- name: 防火墙放行nginx_exporter端口
  shell: systemctl is-active firewalld && firewall-cmd --add-port=9113/tcp --permanent && firewall-cmd --reload || true
